<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top left, #1e293b, #0f172a 100%);
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
        }
        
        .chat-container {
            width: 100%; max-width: 650px; height: 85vh;
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 25px; background-color: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; align-items: center;
        }

        .header-title { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.2rem; }
        
        .header-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .clear-btn {
            background: transparent; border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s ease;
        }
        .clear-btn:hover { background: #ef4444; color: white; }

        .chat-history {
            flex-grow: 1; padding: 25px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .chat-history::-webkit-scrollbar { width: 6px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }
        .chat-history::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            max-width: 82%; padding: 14px 18px; line-height: 1.6;
            font-size: 0.95rem; animation: slideUpFade 0.3s ease-out forwards;
        }

        .user-msg {
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white;
            align-self: flex-end; border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .ai-msg {
            background-color: #334155; color: #f8fafc; align-self: flex-start;
            border-radius: 18px 18px 18px 4px; border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .loading {
            color: #94a3b8; font-style: italic; font-size: 0.9rem; align-self: flex-start;
            display: flex; align-items: center; gap: 8px; animation: slideUpFade 0.3s ease-out forwards;
        }

        .chat-input-area {
            display: flex; padding: 20px; background-color: rgba(15, 23, 42, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05); gap: 12px; align-items: center;
        }

        input {
            flex-grow: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid #475569;
            background-color: #1e293b; color: white; font-size: 0.95rem; outline: none; transition: all 0.3s ease;
        }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }

        .send-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #38bdf8, #3b82f6); color: white;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-title">
                <div class="header-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zM5 10h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2zm3 4v4m8-4v4"></path></svg>
                </div>
                Ai Assistant
            </div>
            <button class="clear-btn" onclick="clearMemory()">Reset Context</button>
        </div>
        
        <div class="chat-history" id="chat-history"></div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Message chat..." onkeypress="handleKeyPress(event)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/chat";
        
        // 1. Initialize Memory from Browser
        let chatMemory = JSON.parse(localStorage.getItem("my_ai_chat_memory")) || [];

        // 2. Render Chat UI
        function renderChat() {
            const historyDiv = document.getElementById('chat-history');
            historyDiv.innerHTML = ''; 

            if (chatMemory.length === 0) {
                historyDiv.innerHTML = `<div class="message ai-msg">Hello Vedant! How can I help you today?</div>`;
            } else {
                chatMemory.forEach(msg => {
                    const msgClass = msg.role === 'User' ? 'user-msg' : 'ai-msg';
                    const formattedText = escapeHtml(msg.text).replace(/\n/g, '<br>');
                    historyDiv.innerHTML += `<div class="message ${msgClass}">${formattedText}</div>`;
                });
            }
            scrollToBottom();
        }

        // 3. Send Message to Python
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const messageText = inputField.value.trim();
            if (!messageText) return;

            // Save user message
            chatMemory.push({ role: 'User', text: messageText });
            localStorage.setItem("my_ai_chat_memory", JSON.stringify(chatMemory));
            renderChat();
            
            inputField.value = ''; 
            
            // Show Loading Animation
            const historyDiv = document.getElementById('chat-history');
            const loadingId = "loading-" + Date.now();
            historyDiv.innerHTML += `
                <div id="${loadingId}" class="loading">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"></path></svg>
                    Processing...
                </div>`;
            scrollToBottom();

            try {
                // Fetch from FastAPI
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: messageText,
                        history: chatMemory.slice(0, -1) // Send history excluding the message we just sent
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();

                // Save AI response
                chatMemory.push({ role: 'AI', text: data.reply });
                localStorage.setItem("my_ai_chat_memory", JSON.stringify(chatMemory));
                renderChat();
                
            } catch (error) {
                document.getElementById(loadingId).remove();
                historyDiv.innerHTML += `<div class="message ai-msg" style="color: #ef4444;">Error: Unable to connect to the backend server. Make sure Uvicorn is running!</div>`;
            }
        }

        // 4. Utility Functions
        function clearMemory() {
            if(confirm("Are you sure you want to clear the chat history?")) {
                localStorage.removeItem("my_ai_chat_memory");
                chatMemory = [];
                renderChat();
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }

        function scrollToBottom() {
            const history = document.getElementById('chat-history');
            history.scrollTop = history.scrollHeight;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // Start the app!
        renderChat();
    </script>
</body>
</html>
