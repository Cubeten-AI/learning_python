<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Dashboard UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Main Container */
.container {
    width: 100%;
    max-width: 1100px;
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

header h1 {
    font-size: 24px;
    color: #333;
}

/* Button */
.btn {
    padding: 10px 18px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #3730a3;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

/* Cards */
.card {
    background: #f9f9f9;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
    color: #4f46e5;
}

.card p {
    color: #555;
    font-size: 14px;
}

/* Sidebar layout */
.layout {
    display: flex;
    gap: 20px;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #111827;
    color: white;
    padding: 20px;
    border-radius: 15px;
}

.sidebar h2 {
    margin-bottom: 15px;
}

.sidebar a {
    display: block;
    color: #ccc;
    text-decoration: none;
    margin: 10px 0;
}

.sidebar a:hover {
    color: white;
}

/* Content */
.content {
    flex: 1;
}

/* Mobile */
@media (max-width: 768px) {
    .layout {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <header>
        <h1>🚀 My Dashboard</h1>
        <button class="btn" onclick="addCard()">Add Card</button>
    </header>

    <div class="layout">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>Menu</h2>
            <a href="#">Home</a>
            <a href="#">Profile</a>
            <a href="#">Settings</a>
            <a href="#">Help</a>
        </div>

        <!-- Main Content -->
        <div class="content">
            <h2>Welcome</h2>
            <p>This is a responsive UI template.</p>

            <div class="grid" id="grid">
                <div class="card">
                    <h3>Card 1</h3>
                    <p>This is a sample card.</p>
                </div>

                <div class="card">
                    <h3>Card 2</h3>
                    <p>Click button to add more cards.</p>
                </div>
            </div>
        </div>

    </div>

</div>

<script>
let count = 3;

function addCard() {
    const grid = document.getElementById("grid");

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h3>Card ${count}</h3>
        <p>Dynamically added card content.</p>
    `;

    grid.appendChild(card);
    count++;
}
</script>

</body>
</html>
