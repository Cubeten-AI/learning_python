<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sunibala AI Assistant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#2563eb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:900px;
height:90vh;
background:white;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.header h1{
font-size:30px;
}

.header p{
margin-top:5px;
opacity:.9;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
background:#f3f6fb;
}

.message{
margin-bottom:15px;
display:flex;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
max-width:70%;
padding:12px 18px;
border-radius:18px;
font-size:16px;
line-height:1.5;
}

.user .bubble{
background:#2563eb;
color:white;
}

.bot .bubble{
background:white;
border:1px solid #ddd;
}

.footer{
display:flex;
padding:15px;
background:white;
border-top:1px solid #ddd;
gap:10px;
}

input{
flex:1;
padding:15px;
font-size:16px;
border:1px solid #bbb;
border-radius:10px;
outline:none;
}

button{
padding:15px 25px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🤖 Sunibala AI Assistant</h1>
<p>Powered by FastAPI & Gemini AI</p>
</div>

<div id="chat" class="chat">

<div class="message bot">
<div class="bubble">
Hello 👋<br><br>
I'm Sunibala AI Assistant.<br>
How can I help you today?
</div>
</div>

</div>

<div class="footer">

<input
id="prompt"
placeholder="Type your message..."
onkeydown="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const API="http://127.0.0.1:8000";

const chat=document.getElementById("chat");

function addMessage(text,type){

chat.innerHTML+=`

<div class="message ${type}">
<div class="bubble">
${text}
</div>
</div>

`;

chat.scrollTop=chat.scrollHeight;

}

async function sendMessage(){

const input=document.getElementById("prompt");

const message=input.value.trim();

if(message=="") return;

addMessage(message,"user");

input.value="";

try{

const response=await fetch(API+"/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:message
})

});

const data=await response.json();

if(data.response){

addMessage(data.response,"bot");

}else{

addMessage("No response received.","bot");

}

}catch(error){

addMessage("❌ Cannot connect to FastAPI server.", "bot");

console.log(error);

}

}

</script>

</body>
</html>
