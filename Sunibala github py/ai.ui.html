from fastapi.responses import HTMLResponse

@app.get("/", response_class=HTMLResponse)
def home():
    return """
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunibala AI Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#2563eb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:900px;
height:90vh;
background:white;
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
background:#f5f7fb;
}

.message{
margin:12px 0;
display:flex;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
max-width:70%;
padding:12px 18px;
border-radius:18px;
}

.user .bubble{
background:#2563eb;
color:white;
}

.bot .bubble{
background:white;
border:1px solid #ddd;
}

.footer{
display:flex;
padding:15px;
border-top:1px solid #ddd;
gap:10px;
}

input{
flex:1;
padding:14px;
font-size:16px;
border-radius:10px;
border:1px solid #bbb;
}

button{
padding:14px 24px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>🤖 Sunibala AI Assistant</h2>
<p>Powered by FastAPI + Gemini</p>
</div>

<div id="chat" class="chat">

<div class="message bot">
<div class="bubble">
Hello 👋<br><br>
I'm Sunibala AI Assistant.<br>
How can I help you today?
</div>
</div>

</div>

<div class="footer">

<input
id="prompt"
placeholder="Ask anything..."
onkeydown="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const chat=document.getElementById("chat");

function addMessage(text,type){

chat.innerHTML+=`
<div class="message ${type}">
<div class="bubble">${text}</div>
</div>
`;

chat.scrollTop=chat.scrollHeight;

}

async function sendMessage(){

const input=document.getElementById("prompt");

const message=input.value.trim();

if(message==="") return;

addMessage(message,"user");

input.value="";

try{

const response=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:message
})

});

if(!response.ok){

const err=await response.text();

addMessage(err,"bot");

return;

}

const data=await response.json();

addMessage(data.response,"bot");

}catch(e){

addMessage("Cannot connect to FastAPI.","bot");

console.log(e);

}

}

</script>

</body>
</html>
"""
