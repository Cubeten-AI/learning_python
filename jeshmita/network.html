<!DOCTYPE html>
<html>
<head>
    <title>API UI</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:100px;
        }
        input,button{
            width:400px;
            padding:10px;
            margin:10px;
            font-size:18px;
        }
        #result{
            width:400px;
            margin:auto;
            border:1px solid #ccc;
            padding:15px;
            text-align:left;
        }
    </style>
</head>
<body>

<h1>Connect to API</h1>

<input type="text" id="url"
value="http://192.168.0.108:8000">

<br>

<button onclick="connectAPI()">Submit</button>

<div id="result">Response will appear here</div>

<script>
async function connectAPI() {
    const url = document.getElementById("url").value;

    try {
        const response = await fetch(url, {
            method: "GET"
        });

        const data = await response.text();

        document.getElementById("result").innerHTML =
            "<pre>" + data + "</pre>";

    } catch (error) {
        document.getElementById("result").innerHTML =
            "Error: " + error.message;
    }
}
</script>

</body>
</html>
