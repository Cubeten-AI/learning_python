<!DOCTYPE html>
<html>
<head>
    <title>Dictionary App</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f2f2f2;
            padding:50px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px;
            margin:5px;
        }

        #result{
            margin-top:20px;
            text-align:left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 Dictionary App</h2>

    <input type="text" id="word" placeholder="Enter word">
    <br><br>

    <button onclick="searchWord()">Search</button>
    <button onclick="speakWord()">🔊 Hear</button>
    <button onclick="voiceSearch()">🎤 Speak</button>

    <div id="result"></div>
</div>

<script>
async function searchWord() {

    const word = document.getElementById("word").value;
    const apiKey = "YOUR_API_KEY";

    try{
        const response = await fetch(
            `https://api.api-ninjas.com/v1/dictionary?word=${word}`,
            {
                headers:{
                    "X-Api-Key":apiKey
                }
            });

        const data = await response.json();

        document.getElementById("result").innerHTML =
        `
        <h3>${word}</h3>
        <p>${data.definition || "No definition found"}</p>
        `;
    }
    catch(error){
        document.getElementById("result").innerHTML =
        "Error loading data";
    }
}

// Hear pronunciation
function speakWord(){
    const word = document.getElementById("word").value;

    const speech = new SpeechSynthesisUtterance(word);
    speech.lang = "en-US";

    window.speechSynthesis.speak(speech);
}

// Voice input
function voiceSearch(){

    const recognition =
        new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = function(event){
        const word =
            event.results[0][0].transcript;

        document.getElementById("word").value = word;

        searchWord();
    };

    recognition.start();
}
</script>

</body>
</html>
